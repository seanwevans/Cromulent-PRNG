name: Nim

on:
  push:
    branches: [ main ]
    paths: [ 'bindings/nim/**', '.github/workflows/nim.yml' ]
  pull_request:
    branches: [ main ]
    paths: [ 'bindings/nim/**', '.github/workflows/nim.yml' ]

jobs:
  test:
    name: nim c -r
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'
      - name: Test
        working-directory: bindings/nim
        run: nim c -r --hints:off tests/test_cromulent.nim
