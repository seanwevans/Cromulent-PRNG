name: Go

on:
  push:
    branches: [ main ]
    paths: [ 'bindings/go/**', '.github/workflows/go.yml' ]
  pull_request:
    branches: [ main ]
    paths: [ 'bindings/go/**', '.github/workflows/go.yml' ]

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Test
        working-directory: bindings/go
        run: go test ./...
