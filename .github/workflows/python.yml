name: Python

on:
  push:
    branches: [ main ]
    paths: [ 'bindings/python/**', '.github/workflows/python.yml' ]
  pull_request:
    branches: [ main ]
    paths: [ 'bindings/python/**', '.github/workflows/python.yml' ]

jobs:
  test:
    name: unittest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Test
        working-directory: bindings/python
        run: python -m unittest -v
